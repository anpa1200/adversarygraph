{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "adversarygraph.fullname" . }}-postgres
  labels:
    {{- include "adversarygraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "adversarygraph.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "adversarygraph.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: POSTGRES_DB
              valueFrom: {secretKeyRef: {name: {{ include "adversarygraph.secretName" . }}, key: DB_NAME}}
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: {{ include "adversarygraph.secretName" . }}, key: DB_USER}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: {{ include "adversarygraph.secretName" . }}, key: DB_PASS}}
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-lc", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "adversarygraph.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adversarygraph.fullname" . }}-postgres
  labels:
    {{- include "adversarygraph.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "adversarygraph.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
