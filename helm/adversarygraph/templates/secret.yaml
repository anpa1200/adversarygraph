{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "adversarygraph.secretName" . }}
  labels:
    {{- include "adversarygraph.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASS: {{ .Values.secrets.dbPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  AUTH_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.authBootstrapAdminPassword | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  MINIMAX_API_KEY: {{ .Values.secrets.minimaxApiKey | quote }}
  NVD_API_KEY: {{ .Values.secrets.nvdApiKey | quote }}
  THREATFOX_AUTH_KEY: {{ .Values.secrets.threatfoxAuthKey | quote }}
  OTX_API_KEY: {{ .Values.secrets.otxApiKey | quote }}
  VIRUSTOTAL_API_KEY: {{ .Values.secrets.virustotalApiKey | quote }}
  URLSCAN_API_KEY: {{ .Values.secrets.urlscanApiKey | quote }}
  SHODAN_API_KEY: {{ .Values.secrets.shodanApiKey | quote }}
  ABUSEIPDB_API_KEY: {{ .Values.secrets.abuseipdbApiKey | quote }}
  CENSYS_API_KEY: {{ .Values.secrets.censysApiKey | quote }}
  OPENCTI_URL: {{ .Values.secrets.openctiUrl | quote }}
  OPENCTI_TOKEN: {{ .Values.secrets.openctiToken | quote }}
  MALWAREGRAPH_API_KEY: {{ .Values.secrets.malwaregraphApiKey | quote }}
{{- end }}
