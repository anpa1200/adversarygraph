worker_processes 1;
pid /tmp/nginx.pid;
error_log /app/logs/attack-simulation/lab-web-error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;

    log_format adversarygraph_lab '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
        'request_time=$request_time upstream_time=$upstream_response_time '
        'upstream_status=$upstream_status request_length=$request_length '
        'run_id="$http_x_adversarygraph_run_id" '
        'simulation_id="$http_x_adversarygraph_simulation_id" '
        'request_index="$http_x_adversarygraph_request_index"';

    access_log /app/logs/attack-simulation/lab-web-access.log adversarygraph_lab;
    sendfile off;
    keepalive_timeout 10;

    server {
        listen 8080;
        server_name _;

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://127.0.0.1:8081;
        }
    }
}
